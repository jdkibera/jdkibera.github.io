<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>World Map Explorer — kibera.com</title>
<meta http-equiv="refresh" content="2; url=https://mapgame.kibera.com/">
<link rel="canonical" href="https://mapgame.kibera.com/">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;1,400&family=IM+Fell+English+SC&display=swap" rel="stylesheet">
<style>
  :root {
    --cream: #FAF8F5;
    --ink: #2D2D2D;
    --muted: #6B6B6B;
    --rule: #E5E0DA;
    --copper: #8C4A2C;
  }
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; }
  body {
    font-family: 'Cormorant Garamond', Georgia, serif;
    background: var(--cream);
    color: var(--ink);
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 40px 24px;
  }
  main {
    max-width: 560px;
    width: 100%;
    text-align: center;
  }
  h1 {
    font-family: 'IM Fell English SC', 'Cormorant Garamond', Georgia, serif;
    font-weight: 400;
    font-size: clamp(2rem, 5.5vw, 3rem);
    margin: 0 0 8px;
    letter-spacing: 0.02em;
  }
  .tag {
    color: var(--muted);
    font-style: italic;
    font-size: 1.05rem;
    margin: 0 0 32px;
  }
  .play {
    display: inline-block;
    margin-top: 8px;
    padding: 14px 34px;
    font-family: 'IM Fell English SC', Georgia, serif;
    font-size: 1.3rem;
    letter-spacing: 0.05em;
    color: var(--cream);
    background: var(--copper);
    text-decoration: none;
    border-radius: 2px;
    transition: background 0.15s;
  }
  .play:hover { background: #6f3820; }
  .fallback {
    display: block;
    margin-top: 24px;
    font-size: 0.9rem;
    color: var(--muted);
    font-style: italic;
  }
  .fallback a { color: var(--copper); }
  .home {
    display: block;
    margin-top: 48px;
    font-size: 0.9rem;
    color: var(--muted);
  }
  .home a { color: var(--muted); text-decoration: underline; }
  footer {
    position: fixed;
    left: 0; right: 0; bottom: 20px;
    text-align: center;
    font-family: ui-monospace, 'SF Mono', Menlo, Consolas, monospace;
    font-size: 11px;
    color: #B8AEA0;
  }
</style>
</head>
<body>
<main>
  <h1>World Map Explorer</h1>
  <p class="tag">Taking you to the map game&hellip;</p>
  <a class="play" href="https://mapgame.kibera.com/">Play Now</a>
  <span class="fallback">If nothing happens, <a href="https://mapgame.kibera.com/">click here</a>.</span>
  <span class="home"><a href="/">&larr; kibera.com</a></span>
</main>
<footer>&copy; 2026 Kibera LLC</footer>
</body>
</html>
