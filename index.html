<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>kibera.com</title>
<style>
  :root {
    --bg-top: #A7B4C2;
    --bg-bottom: #7F8B9A;
    --text: #5F6D7C;
    --link: #8593A2;
    --link-hover: #C8D1DB;
    --footer: #9CA8B5;
  }
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; }
  body {
    font-family: ui-monospace, 'SF Mono', Menlo, Consolas, monospace;
    background: linear-gradient(to bottom, var(--bg-top) 0%, var(--bg-top) 40%, var(--bg-bottom) 100%);
    background-attachment: fixed;
    color: var(--text);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: space-between;
    padding: 80px 24px 32px;
    font-size: 15px;
    line-height: 1.9;
  }
  main {
    width: 100%;
    max-width: 420px;
    margin: auto 0;
  }
  .dir { font-weight: 700; margin-top: 1.4em; }
  .dir:first-child { margin-top: 0; }
  .entry { padding-left: 3ch; }
  a {
    color: var(--link);
    text-decoration: none;
    transition: color 0.15s;
  }
  a:hover { color: var(--link-hover); }
  footer {
    width: 100%;
    max-width: 420px;
    text-align: left;
    font-size: 11px;
    color: var(--footer);
    margin-top: 48px;
  }
</style>
</head>
<body>
  <main>
    <div class="dir">/work</div>
    <div class="entry"><a href="https://sfr3.com">sfr3.com</a></div>
    <div class="entry"><a href="https://americanave.com">americanave.com</a></div>

    <div class="dir">/play</div>
    <div class="entry"><a href="https://mapgame.kibera.com">world map explorer</a></div>
  </main>
  <footer>&copy; 2026 Kibera LLC</footer>
</body>
</html>
